<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>student registration form</title>
</head>
<body>
  <form action="#">
    <h1>Registration Form</h1>
  <br><br>
  <label for="Name">Name:</label>
  <input type="text" id="Name" name="Name" placeholder="Enter Your Name">
  <br><br>
  <label for="mail">Email:</label>
  <input type="email" name="mail" id="mail" placeholder="Enter Your Name">
  <br><br>
  <label for="Num">Phone Number:</label>
  <input type="tel" name="number" id="num" placeholder="Enter Your Number">
  <label for="Gender">Gender:</label>
  <input type="radio"name="male" id="Gender">
  <label for="male">Male</label>
  <input type="radio"name="female" id="Gender">
  <label for="female">Female</label>
  <br><br>
  <label for="Dept">Department:</label>
  <select id="Dept" name="Department">
    <option value="Department">Department</option>
    <option value="CSt">CST</option>
    <option value="CT">CT</option>
    <option value="MT">MT</option>
  </select>
  <br><br>
  <label for="Skill">Skills:</label>
  <select id="Skill" name="Skills">
    <option value="Skill">Skill</option>
    <option value="HTML">HTML</option>
    <option value="CSS">CSS</option>
    <option value="JS">JavaScript</option>
  </select>
  <br><br>
  <label for="date">Date of Birth:</label>
  <input type="date" name="Date of Birth:" id="date">
  <br><br>
  <label for="pass">Password:</label>
  <input type="password" name="Password" id="pass" placeholder="Enter Password">
  <br><br>
  <input type="button" value="Submit">
  <input type="button" value="Reset">
  </form>
</body>
</html>
