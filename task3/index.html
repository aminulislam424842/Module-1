<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>student registration form</title>
</head>
<body>
  <form action="#">
    <h1>Registration Form</h1>
  <br><br>
  <label for="Name">Name:</label>
  <input type="text" id="Name" name="Name" placeholder="Enter Your Name">
  <br><br>
  <label for="mail">Email:</label>
  <input type="email" name="mail" id="mail" placeholder="Enter Your Email">
  <br><br>
  <label for="Num">Phone Number:</label>
  <input type="tel" name="number" id="Num" placeholder="Enter Your Number">
  <label for="Gender">Gender:</label>
  <input type="radio"name="Gender" id="Male">
  <label for="Male">Male</label>
  <input type="radio"name="Gender" id="Female">
  <label for="Female">Female</label>
  <br><br>
  <label for="Dept">Department:</label>
  <select id="Dept" name="Department">
    <option value="Department">Department</option>
    <option value="CSt">CST</option>
    <option value="CT">CT</option>
    <option value="MT">MT</option>
  </select>
  <br><br>
  <label for="Skill">Skills:</label>
  <input type="checkbox" name="Html" id="html">
  <label for="html">Html</label>
  <input type="checkbox" name="Css" id="css">
  <label for="css">Css</label>
  <input type="checkbox" name="Js" id="js">
  <label for="js">Js</label>
  <br><br>
  <label for="date">Date of Birth:</label>
  <input type="date" name="Date of Birth:" id="date">
  <br><br>
  <label for="pass">Password:</label>
  <input type="password" name="Password" id="pass" placeholder="Enter Password">
  <br><br>
  <label for="Add">Address</label>
  <input type="text" name="Address" id="Add" placeholder="Enter Your Address">
  <br><br>
  <label for="Msg">Message</label>
  <textarea name="Message" id="Msg"></textarea>
  <br><br>
  <input type="checkbox" name="Terms & Conditions" id="t&c">
  <label for="t&C">Terms & Conditions</label>
  <br><br>
  <input type="button" value="Submit">
  <input type="button" value="Reset">
  </form>
</body>
</html>
